services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ekidna_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Map .env variables to Postgres-specific names
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ekidna_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ekidna_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database connection (override to use docker service name)
      DB_HOST: db
      DB_PORT: 5432
      # All other variables come from .env file
      # These are explicitly set here only if they need to override .env values
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ekidna_network
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
      - ./pdf:/app/pdf

  # Adminer - Database Management UI (optional, for development)
  adminer:
    image: adminer:latest
    container_name: ekidna_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - ekidna_network
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local

networks:
  ekidna_network:
    driver: bridge
